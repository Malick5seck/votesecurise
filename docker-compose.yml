
services:
  db:
    image: mysql:8.0
    container_name: vote_db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: votesecurise
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql

  backend:
    build:
      context: ./backend
    container_name: vote_backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      DB_CONNECTION: mysql
      DB_HOST: db
      DB_PORT: 3306
      DB_DATABASE: votesecurise
      DB_USERNAME: root
      DB_PASSWORD: root
      QUEUE_CONNECTION: database
      APP_URL: http://localhost:8000
      FRONTEND_URL: http://localhost
      SANCTUM_STATEFUL_DOMAINS: localhost,127.0.0.1
      SESSION_DOMAIN: localhost
    depends_on:
      - db

  queue_worker:
    build:
      context: ./backend
    container_name: vote_queue_worker
    restart: unless-stopped
    command: php artisan queue:work
    environment:
      DB_CONNECTION: mysql
      DB_HOST: db
      DB_PORT: 3306
      DB_DATABASE: votesecurise
      DB_USERNAME: root
      DB_PASSWORD: root
      QUEUE_CONNECTION: database
    depends_on:
      - backend
      - db

  frontend:
    build:
      context: ./frontend
    container_name: vote_frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  db_data: