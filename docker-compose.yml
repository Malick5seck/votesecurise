services:
  db:
    image: mysql:8.0
    container_name: vote_db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: votesecurise
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql

  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: laravel_app
    restart: unless-stopped
    volumes:
      - ./backend:/var/www
    depends_on:
      - db

  nginx:
    image: nginx:alpine
    container_name: laravel_nginx
    restart: unless-stopped
    ports:
      - "8000:80"
    volumes:
      - ./backend:/var/www
      - ./docker/nginx:/etc/nginx/conf.d
    depends_on:
      - app
      - db

  queue_worker:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: vote_queue_worker
    restart: unless-stopped
    command: php artisan queue:work
    volumes:
      - ./backend:/var/www
    depends_on:
      - app
      - db

  frontend:
    image: node:20
    container_name: vote_frontend
    restart: unless-stopped
    working_dir: /app
    volumes:
      - ./frontend:/app
    ports:
      - "3000:3000"
    command: sh -c "npm install && npm run dev -- --port 3000 --host"
    depends_on:
      - app

volumes:
  db_data: